name: Deploy MOMOLIB to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check
        run: |
          find app -name "*.py" -exec python -m py_compile {} \;
          echo "문법 검사 통과"

      - name: Deploy to GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            set -e
            cd ~/momolib
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt -q
            flask db upgrade
            sudo systemctl restart momolib
            sleep 2
            systemctl is-active momolib && echo "배포 성공" || echo "배포 실패"
