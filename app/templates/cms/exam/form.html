{% extends 'base.html' %}
{% block title %}모의고사 {{ '수정' if exam else '생성' }}{% endblock %}
{% block content %}
{% include 'cms/_subnav.html' %}
<div class="mb-4">
    <a href="{{ url_for('cms.mock_exam_list') }}" class="text-sm text-gray-500 hover:text-indigo-600">← 모의고사 목록</a>
</div>
<h2 class="text-xl font-bold text-gray-800 mb-6">모의고사 {{ '수정' if exam else '생성' }}</h2>

<div class="max-w-xl bg-white rounded-xl border border-gray-100 shadow-sm p-6">
    <form method="POST">
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1">제목 *</label>
                <input type="text" name="title" value="{{ exam.title if exam else '' }}" required
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">설명</label>
                <textarea name="description" rows="2"
                          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ exam.description or '' if exam else '' }}</textarea>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">제한 시간 (분, 빈칸=무제한)</label>
                    <input type="number" name="time_limit_minutes"
                           value="{{ exam.time_limit_minutes or '' if exam else '' }}"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">주차</label>
                    <input type="number" name="week_num"
                           value="{{ exam.week_num or '' if exam else '' }}"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">연결 도서</label>
                <select name="book_id" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                    <option value="">없음</option>
                    {% for book in books %}
                    <option value="{{ book.book_id }}" {% if exam and exam.book_id == book.book_id %}selected{% endif %}>{{ book.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">태그</label>
                <input type="text" name="tags" value="{{ exam.tags or '' if exam else '' }}"
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
            </div>
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                <input type="checkbox" name="is_published" value="1"
                       {% if exam and exam.is_published %}checked{% endif %}
                       class="rounded border-gray-300 text-indigo-600">
                공개
            </label>
        </div>
        <button type="submit" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg text-sm">
            {{ '수정 저장' if exam else '생성 → 문항 추가' }}
        </button>
    </form>
</div>
{% endblock %}
