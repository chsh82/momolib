{% extends 'base.html' %}
{% block title %}토론질문 {{ '수정' if question else '등록' }}{% endblock %}
{% block content %}
{% include 'cms/_subnav.html' %}
<div class="mb-4">
    <a href="{{ url_for('cms.reading_quiz_list') }}" class="text-sm text-gray-500 hover:text-indigo-600">← 토론질문 목록</a>
</div>
<h2 class="text-xl font-bold text-gray-800 mb-6">토론질문 {{ '수정' if question else '등록' }}</h2>

{% set d = question.data if question else {} %}
<div class="max-w-2xl bg-white rounded-xl border border-gray-100 shadow-sm p-6">
    <form method="POST">
        <div class="space-y-4">
            <!-- 단계 + 문항번호 -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">단계</label>
                    <select name="step" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">선택 안함</option>
                        {% for s in ['1단계','2단계','3단계','4단계','5단계'] %}
                        <option value="{{ s }}" {% if d.get('step') == s %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">문항번호</label>
                    <input type="text" name="question_no" value="{{ d.get('question_no', '') }}"
                           placeholder="예: 2-1-1)"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <!-- 지문 -->
            <div>
                <label class="block text-xs text-gray-500 mb-1">지문 (발췌문)</label>
                <textarea name="passage" rows="5"
                          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          placeholder="책에서 발췌한 지문을 입력하세요...">{{ d.get('passage', '') }}</textarea>
            </div>
            <!-- 책페이지 -->
            <div>
                <label class="block text-xs text-gray-500 mb-1">책 페이지</label>
                <input type="text" name="page" value="{{ d.get('page', '') }}"
                       placeholder="예: 120p  /  128~129p"
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <!-- 질문 -->
            <div>
                <label class="block text-xs text-gray-500 mb-1">질문 *</label>
                <textarea name="question" rows="3" required
                          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          placeholder="학생에게 제시할 서술형 문항 질문을 입력하세요.">{{ d.get('question', '') }}</textarea>
            </div>
            <!-- 예시답안 -->
            <div>
                <label class="block text-xs text-gray-500 mb-1">예시 답안</label>
                <textarea name="sample_answer" rows="4"
                          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          placeholder="모범 답안 / 예시 답안을 입력하세요.">{{ d.get('sample_answer', '') }}</textarea>
            </div>
            <hr class="border-gray-100">
            <!-- 대/중/소 분류 -->
            <div>
                <label class="block text-xs text-gray-500 mb-2">독서 분류 (대/중/소)</label>
                <div class="grid grid-cols-3 gap-2">
                    <select name="cat_large" id="cat-large" onchange="updateMedium()"
                            class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">대분류</option>
                        {% for large in reading_categories %}
                        <option value="{{ large }}"
                            {% if question and question.cat_large == large %}selected{% endif %}>
                            {{ large }}
                        </option>
                        {% endfor %}
                    </select>
                    <select name="cat_medium" id="cat-medium" onchange="updateSmall()"
                            class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">중분류</option>
                    </select>
                    <select name="cat_small" id="cat-small"
                            class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">소분류</option>
                    </select>
                </div>
            </div>
            <!-- 독해유형 + 난이도 -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">독해유형</label>
                    <input type="text" name="reading_type"
                           value="{{ question.reading_type or '' if question else '' }}"
                           placeholder="예: 추론적/비판적 독해"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">난이도</label>
                    <select name="difficulty" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        {% for val, label in difficulty_choices %}
                        <option value="{{ val }}" {% if question and question.difficulty == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <!-- 연결 도서 + 주차 -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">연결 도서</label>
                    <select name="book_id" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                        <option value="">없음</option>
                        {% for book in books %}
                        <option value="{{ book.book_id }}" {% if question and question.book_id == book.book_id %}selected{% endif %}>{{ book.title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">주차</label>
                    <input type="number" name="week_num" value="{{ question.week_num or '' if question else '' }}"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                </div>
            </div>
            <!-- 태그 -->
            <div>
                <label class="block text-xs text-gray-500 mb-1">태그 (쉼표 구분)</label>
                <input type="text" name="tags" value="{{ question.tags or '' if question else '' }}"
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
            </div>
            <!-- 내부 제목 (자동 생성 안내) -->
            <div>
                <label class="block text-xs text-gray-500 mb-1">내부 제목 <span class="text-gray-400">(목록 표시용, 빈칸이면 자동 생성)</span></label>
                <input type="text" name="title" value="{{ question.title if question else '' }}"
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>
        <button type="submit" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg text-sm">저장</button>
    </form>
</div>

<script>
const READING_CAT = {{ reading_categories | tojson }};
const INIT_LARGE  = "{{ question.cat_large  if question and question.cat_large  else '' }}";
const INIT_MEDIUM = "{{ question.cat_medium if question and question.cat_medium else '' }}";
const INIT_SMALL  = "{{ question.cat_small  if question and question.cat_small  else '' }}";

function setOptions(selectEl, options, selected) {
    selectEl.innerHTML = '<option value="">선택 안함</option>';
    options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt; o.textContent = opt;
        if (opt === selected) o.selected = true;
        selectEl.appendChild(o);
    });
}
function updateMedium() {
    const large = document.getElementById('cat-large').value;
    setOptions(document.getElementById('cat-medium'), large ? Object.keys(READING_CAT[large] || {}) : [], '');
    setOptions(document.getElementById('cat-small'), [], '');
}
function updateSmall() {
    const large = document.getElementById('cat-large').value;
    const medium = document.getElementById('cat-medium').value;
    setOptions(document.getElementById('cat-small'), (large && medium) ? (READING_CAT[large]?.[medium] || []) : [], '');
}
(function init() {
    if (!INIT_LARGE) return;
    document.getElementById('cat-large').value = INIT_LARGE;
    setOptions(document.getElementById('cat-medium'), Object.keys(READING_CAT[INIT_LARGE] || {}), INIT_MEDIUM);
    if (INIT_MEDIUM) {
        setOptions(document.getElementById('cat-small'), READING_CAT[INIT_LARGE]?.[INIT_MEDIUM] || [], INIT_SMALL);
    }
})();
</script>
{% endblock %}
