{% extends 'base.html' %}
{% block title %}강의 영상 {{ '수정' if video else '등록' }}{% endblock %}
{% block content %}
{% include 'cms/_subnav.html' %}
<div class="mb-4">
    <a href="{{ url_for('cms.video_list') }}" class="text-sm text-gray-500 hover:text-indigo-600">← 강의 영상 목록</a>
</div>
<h2 class="text-xl font-bold text-gray-800 mb-6">강의 영상 {{ '수정' if video else '등록' }}</h2>

<div class="max-w-xl bg-white rounded-xl border border-gray-100 shadow-sm p-6">
    <form method="POST">
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1">제목 *</label>
                <input type="text" name="title" value="{{ video.title if video else '' }}" required
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">영상 URL * (YouTube 또는 직접 링크)</label>
                <input type="text" name="url" value="{{ video.url if video else '' }}" required
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="https://youtube.com/watch?v=...">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">재생 시간 (초)</label>
                    <input type="number" name="duration_seconds"
                           value="{{ video.duration_seconds or '' if video else '' }}"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">썸네일 URL</label>
                    <input type="text" name="thumbnail_url"
                           value="{{ video.thumbnail_url or '' if video else '' }}"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">설명</label>
                <textarea name="description" rows="2"
                          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ video.description or '' if video else '' }}</textarea>
            </div>
            <hr class="border-gray-100">
            <!-- 대/중/소 분류 -->
            <div>
                <label class="block text-xs text-gray-500 mb-2">독서 분류 (대/중/소)</label>
                <div class="grid grid-cols-3 gap-2">
                    <select name="cat_large" id="cat-large" onchange="updateMedium()"
                            class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">대분류</option>
                        {% for large in reading_categories %}
                        <option value="{{ large }}"
                            {% if video and video.cat_large == large %}selected{% endif %}>
                            {{ large }}
                        </option>
                        {% endfor %}
                    </select>
                    <select name="cat_medium" id="cat-medium" onchange="updateSmall()"
                            class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">중분류</option>
                    </select>
                    <select name="cat_small" id="cat-small"
                            class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">소분류</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">연결 도서</label>
                    <select name="book_id" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                        <option value="">없음</option>
                        {% for book in books %}
                        <option value="{{ book.book_id }}" {% if video and video.book_id == book.book_id %}selected{% endif %}>{{ book.title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">주차</label>
                    <input type="number" name="week_num" value="{{ video.week_num or '' if video else '' }}"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">태그 (쉼표 구분)</label>
                <input type="text" name="tags" value="{{ video.tags or '' if video else '' }}"
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
            </div>
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                <input type="checkbox" name="is_published" value="1"
                       {% if video and video.is_published %}checked{% endif %}
                       class="rounded border-gray-300 text-indigo-600">
                공개
            </label>
        </div>
        <button type="submit" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg text-sm">저장</button>
    </form>
</div>

<script>
const READING_CAT = {{ reading_categories | tojson }};
const INIT_LARGE  = "{{ video.cat_large  if video and video.cat_large  else '' }}";
const INIT_MEDIUM = "{{ video.cat_medium if video and video.cat_medium else '' }}";
const INIT_SMALL  = "{{ video.cat_small  if video and video.cat_small  else '' }}";

function setOptions(selectEl, options, selected) {
    selectEl.innerHTML = '<option value="">선택 안함</option>';
    options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt; o.textContent = opt;
        if (opt === selected) o.selected = true;
        selectEl.appendChild(o);
    });
}
function updateMedium() {
    const large = document.getElementById('cat-large').value;
    setOptions(document.getElementById('cat-medium'), large ? Object.keys(READING_CAT[large] || {}) : [], '');
    setOptions(document.getElementById('cat-small'), [], '');
}
function updateSmall() {
    const large = document.getElementById('cat-large').value;
    const medium = document.getElementById('cat-medium').value;
    setOptions(document.getElementById('cat-small'), (large && medium) ? (READING_CAT[large]?.[medium] || []) : [], '');
}
(function init() {
    if (!INIT_LARGE) return;
    document.getElementById('cat-large').value = INIT_LARGE;
    setOptions(document.getElementById('cat-medium'), Object.keys(READING_CAT[INIT_LARGE] || {}), INIT_MEDIUM);
    if (INIT_MEDIUM) {
        setOptions(document.getElementById('cat-small'), READING_CAT[INIT_LARGE]?.[INIT_MEDIUM] || [], INIT_SMALL);
    }
})();
</script>
{% endblock %}
