{% extends 'base.html' %}
{% block title %}새 콘텐츠 - MOMOLIB{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{{ url_for('cms.index') }}" class="text-sm text-gray-500 hover:text-indigo-600">← 콘텐츠 목록</a>
    <h2 class="text-2xl font-bold text-gray-800 mt-2">새 콘텐츠 작성</h2>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-3xl">
    <form method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">제목 <span class="text-red-500">*</span></label>
            <input type="text" name="title" required
                   class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="콘텐츠 제목">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">유형</label>
            <select name="content_type"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="notice">공지</option>
                <option value="material">교재/자료</option>
                <option value="template">첨삭 템플릿</option>
                <option value="announcement">안내사항</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">내용</label>
            <textarea name="body" rows="8"
                      class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      placeholder="내용을 입력하세요..."></textarea>
        </div>

        <!-- 대상 지점 설정 -->
        <div class="border border-gray-100 rounded-lg p-5 space-y-4">
            <div class="flex items-center gap-3">
                <input type="checkbox" name="is_global" id="is_global" checked
                       onchange="toggleBranchSelect(this)"
                       class="w-4 h-4 text-indigo-600">
                <label for="is_global" class="text-sm font-medium text-gray-700">전체 지점에 공개</label>
            </div>

            <div id="branch-select" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">대상 지점 선택</label>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-2 max-h-48 overflow-y-auto border border-gray-200 rounded-lg p-3">
                    {% for branch in branches %}
                    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="target_branches" value="{{ branch.branch_id }}"
                               class="w-4 h-4 text-indigo-600">
                        <span class="font-mono text-xs text-indigo-600">{{ branch.code }}</span>
                        {{ branch.name }}
                    </label>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <input type="checkbox" name="is_published" id="is_published"
                   class="w-4 h-4 text-indigo-600">
            <label for="is_published" class="text-sm font-medium text-gray-700">즉시 발행</label>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-lg text-sm">
                저장
            </button>
            <a href="{{ url_for('cms.index') }}"
               class="border border-gray-300 text-gray-600 hover:bg-gray-50 font-medium px-6 py-2.5 rounded-lg text-sm">
                취소
            </a>
        </div>
    </form>
</div>

<script>
function toggleBranchSelect(checkbox) {
    document.getElementById('branch-select').classList.toggle('hidden', checkbox.checked);
}
</script>
{% endblock %}
