{% extends 'base.html' %}
{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{{ url_for('essays.member_notices') }}" class="text-sm text-gray-500 hover:text-indigo-600">← 공지 목록</a>
</div>

<div class="max-w-2xl">
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
        <div class="mb-4">
            {% if post.is_pinned %}
            <span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded font-medium mr-2">고정</span>
            {% endif %}
            <h2 class="text-xl font-bold text-gray-800 mt-2">{{ post.title }}</h2>
            <div class="text-xs text-gray-400 mt-1">
                {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}
            </div>
        </div>
        <div class="border-t border-gray-100 pt-4">
            <div class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">{{ post.content }}</div>
        </div>
    </div>
</div>
{% endblock %}
