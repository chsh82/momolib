{% set lms_nav = [
    ('lms.curriculum_list', '📋 커리큘럼', 'curricula'),
    ('lms.package_list',    '📦 패키지',   'packages'),
] %}
<div class="flex flex-wrap gap-2 mb-6">
    {% for endpoint, label, key in lms_nav %}
    <a href="{{ url_for(endpoint) }}"
       class="px-3 py-1.5 rounded-lg text-sm font-medium border transition
       {% if request.endpoint == endpoint or request.path.startswith('/lms/' + key) %}
         bg-indigo-600 text-white border-indigo-600
       {% else %}
         bg-white text-gray-600 border-gray-200 hover:border-indigo-400 hover:text-indigo-600
       {% endif %}">
        {{ label }}
    </a>
    {% endfor %}
</div>
