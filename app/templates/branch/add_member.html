{% extends 'base.html' %}
{% block title %}회원 추가 - MOMOLIB{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{{ url_for('branch.members') }}" class="text-sm text-gray-500 hover:text-indigo-600">← 회원 목록</a>
    <h2 class="text-2xl font-bold text-gray-800 mt-2">회원 추가</h2>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-2xl">
    <form method="POST" class="space-y-5" id="member-form">

        <!-- 역할 선택 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">역할 <span class="text-red-500">*</span></label>
            <div class="flex gap-3">
                {% for role_val, role_label, color in [('student','학생','blue'), ('parent','학부모','green'), ('teacher','강사','violet')] %}
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="role" value="{{ role_val }}" class="sr-only peer"
                           {% if role_default == role_val %}checked{% endif %}
                           onchange="toggleStudentFields(this.value)">
                    <div class="border-2 rounded-lg px-4 py-3 text-center text-sm font-medium transition
                                peer-checked:border-{{ color }}-500 peer-checked:bg-{{ color }}-50 peer-checked:text-{{ color }}-700
                                border-gray-200 text-gray-600 hover:border-{{ color }}-300">
                        {{ role_label }}
                    </div>
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="grid grid-cols-2 gap-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">이름 <span class="text-red-500">*</span></label>
                <input type="text" name="name" required
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">연락처</label>
                <input type="text" name="phone"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="010-0000-0000">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">이메일 <span class="text-red-500">*</span></label>
                <input type="email" name="email" required
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">초기 비밀번호 <span class="text-red-500">*</span></label>
                <input type="password" name="password" required minlength="6"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>

        <!-- 학생 전용 필드 -->
        <div id="student-fields" class="{% if role_default != 'student' %}hidden{% endif %} space-y-5 border-t border-gray-100 pt-5">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">학생 추가 정보</p>
            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">학년</label>
                    <select name="grade"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">선택 안함</option>
                        {% for val, label in grade_choices %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">학교명</label>
                    <input type="text" name="school"
                           class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">학생 코드</label>
                    <div class="flex gap-2">
                        <input type="text" name="student_code" id="student-code" maxlength="20"
                               value="{{ next_student_code }}"
                               class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono"
                               placeholder="자동 생성됨">
                        <button type="button" onclick="refreshStudentCode()"
                                class="px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-500 hover:bg-gray-50"
                                title="재생성">↺</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">자동 생성됩니다. 직접 수정도 가능합니다.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">생년월일</label>
                    <input type="date" name="birth_date"
                           class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">메모 (강사용)</label>
                <textarea name="notes" rows="2"
                          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          placeholder="특이사항, 수준 등"></textarea>
            </div>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-lg text-sm">
                등록
            </button>
            <a href="{{ url_for('branch.members') }}"
               class="border border-gray-300 text-gray-600 hover:bg-gray-50 font-medium px-6 py-2.5 rounded-lg text-sm">
                취소
            </a>
        </div>
    </form>
</div>

<script>
function toggleStudentFields(role) {
    document.getElementById('student-fields').classList.toggle('hidden', role !== 'student');
}

function refreshStudentCode() {
    fetch('/branch/members/next-student-code')
        .then(r => r.json())
        .then(data => { document.getElementById('student-code').value = data.code; });
}
</script>
{% endblock %}
