{% extends 'base.html' %}
{% block title %}지점 추가 - MOMOLIB{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{{ url_for('hq.branches') }}" class="text-sm text-gray-500 hover:text-indigo-600">← 지점 목록</a>
    <h2 class="text-2xl font-bold text-gray-800 mt-2">새 지점 등록</h2>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-2xl">
    <form method="POST" class="space-y-6">
        <div class="grid grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">지점 코드 <span class="text-red-500">*</span></label>
                <input type="text" name="code" required maxlength="10" style="text-transform:uppercase"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono"
                       placeholder="예: BUSAN01">
                <p class="text-xs text-gray-400 mt-1">영문+숫자, 최대 10자</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">학생코드 접두어 <span class="text-red-500">*</span></label>
                <input type="text" name="short_code" required maxlength="4" style="text-transform:uppercase"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono"
                       placeholder="예: GN">
                <p class="text-xs text-gray-400 mt-1">영문 2~4자 (예: GN, BD, SC)</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">지점명 <span class="text-red-500">*</span></label>
                <input type="text" name="name" required
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="예: 모모립 부산점">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">주소</label>
            <input type="text" name="address"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="지점 주소">
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">연락처</label>
                <input type="text" name="phone"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="051-000-0000">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                <input type="email" name="email"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="branch@example.com">
            </div>
        </div>

        <hr class="border-gray-100">
        <h3 class="text-sm font-semibold text-gray-700">계약 정보</h3>

        <div class="grid grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">로열티 비율 (%)</label>
                <input type="number" name="royalty_rate" value="20" min="0" max="100"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">월 고정비 (원)</label>
                <input type="number" name="monthly_fee" value="0" min="0"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">계약 시작일</label>
                <input type="date" name="contract_start"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-lg text-sm">
                지점 등록
            </button>
            <a href="{{ url_for('hq.branches') }}"
               class="border border-gray-300 text-gray-600 hover:bg-gray-50 font-medium px-6 py-2.5 rounded-lg text-sm">
                취소
            </a>
        </div>
    </form>
</div>
{% endblock %}
